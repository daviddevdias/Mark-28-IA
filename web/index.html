<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S ◈ MARK XXVII</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo-ring">
                <div class="logo-inner">
                    <span class="logo-icon">◈</span>
                </div>
            </div>
            <h1 class="logo-title">J.A.R.V.I.S</h1>
            <p class="logo-sub">MARK XXVII · NEURAL OS</p>
        </div>

        <div class="sidebar-sep"></div>

        <nav class="sidebar-nav" id="navBtns"></nav>

        <div class="sidebar-footer">
            <div class="sys-status">
                <span class="status-dot"></span>
                <span class="status-txt">SISTEMA ONLINE</span>
            </div>
            <div class="sidebar-meta" id="sidebarMeta">HOST · CORE-SYSTEM</div>
            <button class="btn-power" onclick="confirmarDesligamento()">
                <span>⏻</span> ENCERRAR
            </button>
        </div>
    </nav>

    <main id="main">
        <header class="topbar">
            <span class="topbar-title" id="pageTitle">PAINEL CENTRAL</span>
            <div class="topbar-right">
                <div id="iaBadge" onclick="navegarPara(5)" title="Modelo ativo — clique para trocar"></div>
                <div class="topbar-sep"></div>
                <span id="clock">00:00:00</span>
            </div>
        </header>

        <div class="content" id="content"></div>
    </main>

</div>

<div id="toast"></div>

<div class="modal-overlay" id="modalShutdown">
    <div class="modal-box danger">
        <div class="modal-icon">⏻</div>
        <h3>ENCERRAR J.A.R.V.I.S</h3>
        <p>Confirmar desligamento completo do sistema?</p>
        <div class="modal-btns">
            <button class="btn btn-danger" onclick="desligarJarvis()">DESLIGAR</button>
            <button class="btn btn-ghost" onclick="fecharModal('modalShutdown')">CANCELAR</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalClose">
    <div class="modal-box warn">
        <div class="modal-icon">◉</div>
        <h3>FECHAR INTERFACE</h3>
        <p>Apenas ocultar o painel?</p>
        <div class="modal-btns">
            <button class="btn btn-warn" onclick="fecharPainel()">FECHAR</button>
            <button class="btn btn-ghost" onclick="fecharModal('modalClose')">CANCELAR</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
