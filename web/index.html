<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.O.R.E ◈ MARK XXIX ◈ INTERFACE NEURAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="aplicativo">

    <nav id="barra-lateral">
        <div class="lateral-logo">
            <h1>C.O.R.E</h1>
            <p>MARK XXIX ◈ NEURAL OS</p>
            <small>by David</small>
        </div>

        <div class="lateral-divisor"></div>
        <div class="lateral-navegacao" id="botoesNav"></div>

        <div class="lateral-rodape">
            <div class="lateral-servidor">
                HOST <span id="lateralServidor">CORE-SYSTEM</span><br>
                STATUS <span style="color:var(--verde)">ONLINE</span>
            </div>
            <button class="btn-desligar" onclick="confirmarDesligamento()">⏻  ENCERRAR SISTEMA</button>
        </div>
    </nav>

    <div id="principal">
        <div class="barra-superior">
            <span class="titulo-barra-superior" id="tituloPagina">DIAGNÓSTICO DO NÚCLEO</span>

            <div class="status-barra-superior">
                <span class="ponto-status">SISTEMA OPERACIONAL</span>

                <div id="iaBadge"
                     onclick="navegarPara(6)"
                     title="Modelo de IA ativo — clique para trocar">
                </div>

                <span id="relogio">00:00:00</span>
            </div>
        </div>

        <div class="conteudo" id="conteudo-principal"></div>
    </div>

</div>

<div id="toast"></div>

<div class="alerta-sistema" id="alertaSistema">
    <div class="caixa-alerta">
        <h3>⚠ CONFIRMAR SHUTDOWN</h3>
        <p>Isso encerrará o painel C.O.R.E. Tem certeza?</p>
        <div class="btns-alerta">
            <button class="btn btn-perigo"
                    onclick="window.close(); document.getElementById('alertaSistema').classList.remove('mostrar')">
                ENCERRAR
            </button>
            <button class="btn btn-destaque"
                    onclick="document.getElementById('alertaSistema').classList.remove('mostrar')">
                CANCELAR
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
