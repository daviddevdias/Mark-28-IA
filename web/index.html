<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S ◈ MARK XXVIII</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <header id="topnav" class="topnav">
        <div class="topnav-brand">
            <div class="arc-reactor" aria-hidden="true" title="Núcleo J.A.R.V.I.S">
                <svg viewBox="0 0 64 64" class="arc-reactor-svg">
                    <defs>
                        <radialGradient id="arcGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#fff2cc;stop-opacity:1" />
                            <stop offset="45%" style="stop-color:#ffb400;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#cc5500;stop-opacity:0.9" />
                        </radialGradient>
                    </defs>
                    <circle class="arc-ring arc-r3" cx="32" cy="32" r="28" fill="none" />
                    <circle class="arc-ring arc-r2" cx="32" cy="32" r="20" fill="none" />
                    <circle class="arc-ring arc-r1" cx="32" cy="32" r="12" fill="none" />
                    <circle cx="32" cy="32" r="6" fill="url(#arcGrad)" class="arc-core" />
                </svg>
            </div>
            <div class="topnav-titles">
                <h1 class="logo-title">J.A.R.V.I.S</h1>
                <p class="logo-sub">MARK XXVIII · NEURAL OS</p>
            </div>
        </div>

        <div class="topnav-nav-cluster">
            <button type="button" class="nav-scroll-fab" id="navScrollLeft" aria-label="Menu para a esquerda">◀</button>
            <nav class="topnav-scroll" id="topnavScroll">
                <div class="sidebar-nav" id="navBtns"></div>
            </nav>
            <button type="button" class="nav-scroll-fab" id="navScrollRight" aria-label="Menu para a direita">▶</button>
        </div>

        <div class="topnav-end">
            <div class="sys-status">
                <span class="status-dot"></span>
                <span class="status-txt">SISTEMA ONLINE</span>
            </div>
            <div class="sidebar-meta" id="sidebarMeta">HOST · CORE-SYSTEM</div>
            <button class="btn-power" type="button" onclick="confirmarDesligamento()">
                <span>⏻</span> ENCERRAR
            </button>
        </div>
    </header>

    <main id="main">
        <header class="topbar">
            <span class="topbar-title" id="pageTitle">PAINEL CENTRAL</span>
            <div class="topbar-right">
                <div id="iaBadge" onclick="navegarPara(window.PG.IA)" title="Modelo ativo — clique para trocar"></div>
                <div class="topbar-sep"></div>
                <span id="clock">00:00:00</span>
            </div>
        </header>

        <div class="content" id="content"></div>
    </main>

</div>

<div id="toast"></div>

<div class="modal-overlay" id="modalShutdown">
    <div class="modal-box danger">
        <div class="modal-icon">⏻</div>
        <h3>ENCERRAR J.A.R.V.I.S</h3>
        <p>Confirmar desligamento completo do sistema?</p>
        <div class="modal-btns">
            <button class="btn btn-danger" onclick="desligarJarvis()">DESLIGAR</button>
            <button class="btn btn-ghost" onclick="fecharModal('modalShutdown')">CANCELAR</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalClose">
    <div class="modal-box warn">
        <div class="modal-icon">◉</div>
        <h3>FECHAR INTERFACE</h3>
        <p>Apenas ocultar o painel?</p>
        <div class="modal-btns">
            <button class="btn btn-warn" onclick="fecharPainel()">FECHAR</button>
            <button class="btn btn-ghost" onclick="fecharModal('modalClose')">CANCELAR</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
